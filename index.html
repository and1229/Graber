<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Фото</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #1a1a1a;
      color: #e8e8e8;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 1rem 2rem;
    }
    figure {
      margin: 0;
      max-width: min(100%, 520px);
      width: 100%;
    }
    figure img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
    .panel {
      max-width: min(100%, 520px);
      margin-top: 1.25rem;
      padding: 1rem;
      background: #2a2a2a;
      border-radius: 8px;
      font-size: 0.875rem;
      line-height: 1.5;
    }
    .panel p { margin: 0 0 0.75rem; }
    .panel p:last-child { margin-bottom: 0; }
    button {
      margin-top: 0.75rem;
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #0d7dd6;
      color: #fff;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #status {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: #aaa;
      white-space: pre-wrap;
    }
    .err { color: #f66; }
    .ok { color: #6c6; }
  </style>
</head>
<body>
  <figure>
    <img
      src="fitonbot-1773979162864.png"
      alt=""
      width="1080"
      height="1920"
      decoding="async"
    />
  </figure>

  <div class="panel">
    <p>
      Чтобы получить координаты с модуля GPS (как в навигаторе), браузер покажет
      системный запрос разрешения — без него точное место недоступно.
    </p>
    <p>
      После согласия страница отправит на сервер координаты и доступные сведения
      об устройстве; сервер пришлёт их в Telegram. Токен бота в странице не хранится.
    </p>
    <button type="button" id="send">Разрешить геолокацию и отправить данные</button>
    <div id="status"></div>
  </div>

  <script>
    (function () {
      const btn = document.getElementById("send");
      const status = document.getElementById("status");

      function collectEnv() {
        const nav = navigator;
        const conn = nav.connection || nav.mozConnection || nav.webkitConnection;
        const out = {
          userAgent: nav.userAgent,
          language: nav.language,
          languages: nav.languages ? Array.from(nav.languages) : [],
          platform: nav.platform,
          hardwareConcurrency: nav.hardwareConcurrency,
          deviceMemory: nav.deviceMemory,
          maxTouchPoints: nav.maxTouchPoints,
          cookieEnabled: nav.cookieEnabled,
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          screen: {
            width: screen.width,
            height: screen.height,
            availWidth: screen.availWidth,
            availHeight: screen.availHeight,
            pixelDepth: screen.pixelDepth,
            orientation: screen.orientation ? screen.orientation.type : null,
          },
          viewport: {
            innerWidth: window.innerWidth,
            innerHeight: window.innerHeight,
            devicePixelRatio: window.devicePixelRatio,
          },
          referrer: document.referrer || "",
          pageUrl: location.href,
        };
        if (conn) {
          out.network = {
            effectiveType: conn.effectiveType,
            downlink: conn.downlink,
            rtt: conn.rtt,
            saveData: conn.saveData,
          };
        }
        return out;
      }

      function readGeo() {
        return new Promise((resolve, reject) => {
          if (!navigator.geolocation) {
            reject(new Error("Geolocation не поддерживается"));
            return;
          }
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              const c = pos.coords;
              resolve({
                latitude: c.latitude,
                longitude: c.longitude,
                accuracyM: c.accuracy,
                altitude: c.altitude,
                altitudeAccuracyM: c.altitudeAccuracy,
                heading: c.heading,
                speed: c.speed,
                timestamp: pos.timestamp,
              });
            },
            (err) => reject(err),
            {
              enableHighAccuracy: true,
              maximumAge: 0,
              timeout: 25000,
            }
          );
        });
      }

      btn.addEventListener("click", async () => {
        status.textContent = "";
        btn.disabled = true;
        status.textContent = "Ждём разрешение и фиксацию GPS…";

        let geo;
        try {
          geo = await readGeo();
        } catch (e) {
          status.innerHTML =
            '<span class="err">Геолокация: ' +
            (e && e.message ? e.message : String(e)) +
            "</span>";
          btn.disabled = false;
          return;
        }

        const payload = {
          collectedAt: new Date().toISOString(),
          env: collectEnv(),
          geolocation: geo,
        };

        try {
          const r = await fetch("/api/report", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const text = await r.text();
          if (!r.ok) {
            throw new Error(text || "HTTP " + r.status);
          }
          status.innerHTML =
            '<span class="ok">Отправлено в Telegram.</span>\n' + text;
        } catch (e) {
          status.innerHTML =
            '<span class="err">Ошибка отправки: ' +
            (e && e.message ? e.message : String(e)) +
            "</span>";
        } finally {
          btn.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
